server.address=127.0.0.1
server.port=8085

spring.datasource.url=jdbc:postgresql://localhost:5432/neuroKey
spring.datasource.username=kawase
spring.datasource.password=root

# Strategy: 'update' will create tables for you automatically based on your Java classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.error.whitelabel.enabled=false
spring.web.resources.add-mappings=false

mentora.ml.container-command=${MENTORA_ML_CONTAINER_COMMAND:docker}
mentora.ml.image=${MENTORA_ML_IMAGE:mentora-ml-runner:1}
mentora.ml.timeout-seconds=${MENTORA_ML_TIMEOUT_SECONDS:15}

mentora.dev-packets-enabled=${MENTORA_DEV_PACKETS_ENABLED:false}
mentora.security.totp-encryption-key=${MENTORA_TOTP_ENCRYPTION_KEY:}
mentora.security.login-challenge-ttl-seconds=${MENTORA_LOGIN_CHALLENGE_TTL_SECONDS:300}
mentora.security.login-challenge-attempt-limit=${MENTORA_LOGIN_CHALLENGE_ATTEMPT_LIMIT:5}
mentora.security.enrollment-ttl-seconds=${MENTORA_ENROLLMENT_TTL_SECONDS:600}
mentora.security.parent-session-ttl-days=${MENTORA_PARENT_SESSION_TTL_DAYS:30}
