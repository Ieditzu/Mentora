name: Request Unity activation file

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  activation-file:
    name: Generate Unity .alf for GameCI
    runs-on: ubuntu-latest

    steps:
      - name: Generate manual activation request
        id: activation
        uses: game-ci/unity-request-activation-file@v2

      - name: Upload activation request
        uses: actions/upload-artifact@v4
        with:
          name: Unity-GameCI-Activation-File
          path: ${{ steps.activation.outputs.filePath }}
          if-no-files-found: error
          retention-days: 7
