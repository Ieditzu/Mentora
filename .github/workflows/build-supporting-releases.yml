name: Build supporting release components

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-parent-app:
    name: Build Android parent app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kotlin-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Build release APK
        run: ./gradlew assembleRelease
      - name: Upload Android parent app
        uses: actions/upload-artifact@v4
        with:
          name: Mentora-Parent-Android
          path: kotlin-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

  java-server:
    name: Build Java server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-server/Java-Server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Build executable JAR
        run: ./gradlew bootJar
      - name: Upload server JAR
        uses: actions/upload-artifact@v4
        with:
          name: Mentora-Java-Server
          path: java-server/Java-Server/build/libs/*.jar
          if-no-files-found: error
          retention-days: 30

  web-creator:
    name: Build web creator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-creator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-creator/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build static site
        run: npm run build
      - name: Upload web creator
        uses: actions/upload-artifact@v4
        with:
          name: Mentora-Web-Creator
          path: web-creator/dist
          if-no-files-found: error
          retention-days: 30
