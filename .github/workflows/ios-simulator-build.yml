name: iOS Build

on:
  push:
    paths:
      - "kotlin-app/**"
      - ".github/workflows/ios-simulator-build.yml"
  pull_request:
    paths:
      - "kotlin-app/**"
      - ".github/workflows/ios-simulator-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-15
    defaults:
      run:
        working-directory: kotlin-app

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('kotlin-app/gradle/libs.versions.toml', 'kotlin-app/gradle/wrapper/gradle-wrapper.properties', 'kotlin-app/shared/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec iosApp/project.yml --project iosApp

      - name: Test shared iOS protocol
        run: ./gradlew :shared:iosSimulatorArm64Test

      - name: Archive app
        run: >-
          xcodebuild archive
          -project iosApp/MentoraIOS.xcodeproj
          -scheme MentoraIOS
          -configuration Release
          -sdk iphoneos
          -archivePath ${{ runner.temp }}/MentoraParentIOS.xcarchive
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p ${{ runner.temp }}/ipa/Payload
          cp -r "${{ runner.temp }}/MentoraParentIOS.xcarchive/Products/Applications/MentoraIOS.app" \
            "${{ runner.temp }}/ipa/Payload/MentoraParentIOS.app"
          cd ${{ runner.temp }}/ipa
          zip -r MentoraParentIOS.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MentoraParentIOS
          path: ${{ runner.temp }}/ipa/MentoraParentIOS.ipa
          retention-days: 14
