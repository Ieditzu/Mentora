name: MentoraIOS
options:
  bundleIdPrefix: io.github.kawase
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    SWIFT_VERSION: 5.0
targets:
  MentoraIOS:
    type: application
    platform: iOS
    scheme:
      testTargets:
        - MentoraIOSTests
    sources:
      - path: MentoraIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kawase.mentora.ios
        INFOPLIST_FILE: MentoraIOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS: $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS: $(inherited) -framework MentoraShared
    preBuildScripts:
      - name: Build shared Kotlin framework
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
  MentoraIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MentoraIOSTests
      - path: ../../test-fixtures/protocol/v1/packets.json
        buildPhase: resources
    dependencies:
      - target: MentoraIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kawase.mentora.ios.tests
        GENERATE_INFOPLIST_FILE: YES
